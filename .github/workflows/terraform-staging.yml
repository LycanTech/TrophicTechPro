name: Terraform — Staging Infrastructure

# Triggered by:
#   - PR from main → staging  (runs plan, posts comment, enforces source branch)
#   - Push to staging          (runs apply after PR is merged)
#   - workflow_dispatch        (manual plan or apply from the Actions tab)
#
# Required GitHub secrets (Settings → Secrets → Actions):
#   AZURE_CLIENT_ID       — Service Principal / App Registration client ID (OIDC)
#   AZURE_TENANT_ID       — Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID — Target Azure subscription
#   TF_DB_ADMIN_PASSWORD  — PostgreSQL admin password (min 8 chars, upper+lower+digit)
#   TF_AUTH_SECRET        — Auth.js AUTH_SECRET (openssl rand -base64 32)
#
# One-time Azure OIDC setup (run locally before first use):
#   az ad app create --display-name "github-trophic-staging"
#   APP_ID=$(az ad app list --display-name "github-trophic-staging" --query "[0].appId" -o tsv)
#   az ad sp create --id $APP_ID
#   SP_OID=$(az ad sp show --id $APP_ID --query id -o tsv)
#   az role assignment create --assignee-object-id $SP_OID --role Contributor \
#     --scope /subscriptions/<subscription-id> --assignee-principal-type ServicePrincipal
#   az ad app federated-credential create --id $APP_ID --parameters '{
#     "name": "github-staging-push",
#     "issuer": "https://token.actions.githubusercontent.com",
#     "subject": "repo:LycanTech/TrophicTechPro:ref:refs/heads/staging",
#     "audiences": ["api://AzureADTokenExchange"]
#   }'
#   az ad app federated-credential create --id $APP_ID --parameters '{
#     "name": "github-staging-pr",
#     "issuer": "https://token.actions.githubusercontent.com",
#     "subject": "repo:LycanTech/TrophicTechPro:pull_request",
#     "audiences": ["api://AzureADTokenExchange"]
#   }'
#   echo "Set AZURE_CLIENT_ID=$APP_ID in GitHub secrets"

on:
  pull_request:
    branches: [staging]
    paths:
      - "infrastructure/terraform/environments/staging/**"
      - "infrastructure/terraform/modules/**"
  push:
    branches: [staging]
    paths:
      - "infrastructure/terraform/environments/staging/**"
      - "infrastructure/terraform/modules/**"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        default: plan
        type: choice
        options: [plan, apply]

permissions:
  id-token: write       # OIDC token exchange with Azure AD
  contents: read
  pull-requests: write  # post plan output as PR comment

env:
  TF_DIR: infrastructure/terraform/environments/staging
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: "true"
  TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  TF_VAR_db_admin_password: ${{ secrets.TF_DB_ADMIN_PASSWORD }}
  TF_VAR_auth_secret: ${{ secrets.TF_AUTH_SECRET }}
  TF_IN_AUTOMATION: "true"

jobs:
  # ── Plan ─────────────────────────────────────────────────────────────────────
  # Runs on every PR targeting staging. Enforces that the source is main,
  # then posts the plan diff as a PR comment so reviewers can see exactly
  # what Azure resources will be created / changed / destroyed.
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && inputs.action == 'plan')

    defaults:
      run:
        working-directory: ${{ env.TF_DIR }}

    steps:
      - name: Enforce main → staging promotion
        if: github.event_name == 'pull_request' && github.head_ref != 'main'
        run: |
          echo "::error::Staging deployments must originate from 'main'."
          echo "::error::This PR comes from '${{ github.head_ref }}' — close it and open a PR from main."
          exit 1

      - uses: actions/checkout@v4

      - name: Azure OIDC login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
          FMT_OUTCOME: ${{ steps.fmt.outcome }}
          VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            let plan = fs.readFileSync(
              path.join(process.env.TF_DIR, 'plan_output.txt'),
              'utf8'
            );
            // Truncate very large plans to stay within PR comment limits
            if (plan.length > 60000) {
              plan = '... (output truncated — first 60k chars shown)\n\n' + plan.slice(0, 60000);
            }

            const planOk  = process.env.PLAN_OUTCOME      === 'success';
            const fmtOk   = process.env.FMT_OUTCOME        === 'success';
            const valOk   = process.env.VALIDATE_OUTCOME   === 'success';

            const statusLine = [
              `Format: ${fmtOk  ? '✅' : '⚠️'}`,
              `Validate: ${valOk ? '✅' : '❌'}`,
              `Plan: ${planOk   ? '✅' : '❌'}`,
            ].join('  |  ');

            const body = `## 🏗️ Terraform Staging Plan

            ${statusLine}
            ${!fmtOk ? '\n> ⚠️ Run `terraform fmt -recursive` to fix formatting.\n' : ''}

            <details>
            <summary>Show plan diff</summary>

            \`\`\`hcl
            ${plan}
            \`\`\`
            </details>

            ---
            Merging this PR will trigger **\`terraform apply\`** on \`staging\`.`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

            if (!planOk) core.setFailed('Terraform plan failed — see plan output above.');

  # ── Apply ─────────────────────────────────────────────────────────────────────
  # Runs after a PR is merged into staging (push event).
  # The "staging" GitHub Environment gate requires a manual reviewer approval
  # before Terraform apply executes — this is the second approval layer on top
  # of the PR review required by branch protection.
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/staging') ||
      (github.event_name == 'workflow_dispatch' && inputs.action == 'apply')
    environment:
      name: staging
      url: https://staging.zingy.io

    defaults:
      run:
        working-directory: ${{ env.TF_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure OIDC login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan (pre-apply gate)
        run: terraform plan -no-color -detailed-exitcode -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Capture Terraform outputs
        id: outputs
        run: terraform output -json 2>/dev/null || echo "{}"

      - name: Write job summary
        run: |
          echo "## ✅ Staging Infrastructure Applied" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Outputs" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          terraform output -json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
