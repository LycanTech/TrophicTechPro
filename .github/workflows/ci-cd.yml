name: Trophic Tech — CI/CD

# push to main   → test → deploy staging → (approval) → deploy production
# pull_request   → test only
# workflow_dispatch → manual trigger

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  security-events: write

env:
  NODE_VERSION: "20"

jobs:
  # ── 1. Test ──────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Run tests
        run: npm run test:coverage
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
          NODE_ENV: test

  # ── 2. Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build Next.js app
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: 1

      - name: Package for deployment
        run: |
          zip -r deploy.zip . \
            -x "*.git*" \
            -x "node_modules/.cache/*" \
            -x "__tests__/*" \
            -x "coverage/*" \
            -x "*.env*"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-package
          path: deploy.zip
          retention-days: 1

  # ── 3. Deploy → Staging ───────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: staging
      url: https://${{ secrets.STAGING_APP_NAME }}.azurewebsites.net

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-package

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service (Staging)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.STAGING_APP_NAME }}
          package: deploy.zip

      - name: Set staging environment variables
        run: |
          az webapp config appsettings set \
            --name ${{ secrets.STAGING_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --settings \
              NODE_ENV=production \
              DATABASE_URL="${{ secrets.STAGING_DATABASE_URL }}" \
              AUTH_SECRET="${{ secrets.AUTH_SECRET }}" \
              NEXTAUTH_URL="https://${{ secrets.STAGING_APP_NAME }}.azurewebsites.net" \
              NEXT_TELEMETRY_DISABLED=1

      - name: Smoke test
        run: |
          sleep 30
          curl --fail --retry 5 --retry-delay 10 \
            "https://${{ secrets.STAGING_APP_NAME }}.azurewebsites.net/api/health" \
            || echo "Health check endpoint not available — check app logs"

  # ── 4. Deploy → Production ────────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: https://${{ secrets.PROD_APP_NAME }}.azurewebsites.net

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-package

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service (Production)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.PROD_APP_NAME }}
          package: deploy.zip

      - name: Set production environment variables
        run: |
          az webapp config appsettings set \
            --name ${{ secrets.PROD_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --settings \
              NODE_ENV=production \
              DATABASE_URL="${{ secrets.PROD_DATABASE_URL }}" \
              AUTH_SECRET="${{ secrets.AUTH_SECRET }}" \
              NEXTAUTH_URL="https://${{ secrets.PROD_APP_NAME }}.azurewebsites.net" \
              NEXT_TELEMETRY_DISABLED=1

      - name: Verify production deployment
        run: |
          sleep 30
          curl --fail --retry 5 --retry-delay 15 \
            "https://${{ secrets.PROD_APP_NAME }}.azurewebsites.net/api/health" \
            || echo "Health check endpoint not available — check app logs"
