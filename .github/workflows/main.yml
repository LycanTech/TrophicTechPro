name: Trophic Tech — CI/CD Pipeline

on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main, staging, dev]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # required for upload-sarif to post to the Security tab
  pull-requests: read

env:
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}           # e.g. trophictech.azurecr.io
  ACR_REPOSITORY: ${{ secrets.ACR_REPOSITORY }}       # e.g. app-name
  AKS_CLUSTER: ${{ secrets.AKS_CLUSTER }}             # AKS cluster name
  AKS_RESOURCE_GROUP: ${{ secrets.AKS_RESOURCE_GROUP }}
  HELM_RELEASE: ${{ secrets.HELM_RELEASE }}           # e.g. trophic-app
  HELM_CHART_PATH: ./helm/app
  STAGING_NAMESPACE: staging
  PROD_NAMESPACE: production

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Security & Quality Gate
  # ─────────────────────────────────────────────
  security-scan:
    name: Security & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run ESLint
        id: eslint
        run: npm run lint -- --format=sarif --output-file=eslint-results.sarif
        continue-on-error: true

      - name: Upload ESLint results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && steps.eslint.outcome != 'skipped' && hashFiles('eslint-results.sarif') != ''
        with:
          sarif_file: eslint-results.sarif
          category: eslint

      - name: Run Trivy secret scan (source)
        id: trivy-source
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'secret,vuln'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          format: 'sarif'
          output: 'trivy-source.sarif'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && steps.trivy-source.outcome != 'skipped' && hashFiles('trivy-source.sarif') != ''
        with:
          sarif_file: trivy-source.sarif
          category: trivy-source

  # ─────────────────────────────────────────────
  # JOB 2: Unit & Integration Tests
  # ─────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: security-scan
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run unit tests with coverage
        run: npm run test:coverage
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
          NODE_ENV: test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  # ─────────────────────────────────────────────
  # JOB 3: Docker Build & Push to ACR
  # ─────────────────────────────────────────────
  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.build.outputs.digest }}

    permissions:
      id-token: write
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure OIDC login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Log in to Azure Container Registry
        if: env.ACR_REGISTRY != ''
        run: az acr login --name ${{ env.ACR_REGISTRY }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        if: env.ACR_REGISTRY != ''
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ACR_REGISTRY }}/${{ env.ACR_REPOSITORY }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push image to ACR
        id: build
        if: env.ACR_REGISTRY != ''
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.ACR_REGISTRY }}/${{ env.ACR_REPOSITORY }}:buildcache
          cache-to: type=registry,ref=${{ env.ACR_REGISTRY }}/${{ env.ACR_REPOSITORY }}:buildcache,mode=max
          provenance: true
          sbom: true

      - name: Scan Docker image for vulnerabilities (Trivy)
        if: env.ACR_REGISTRY != '' && steps.build.outputs.digest != ''
        continue-on-error: true   # report findings in Security tab without blocking pipeline
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ACR_REGISTRY }}/${{ env.ACR_REPOSITORY }}@${{ steps.build.outputs.digest }}
          format: 'sarif'
          output: 'trivy-image.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

      - name: Upload image scan SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && env.ACR_REGISTRY != '' && hashFiles('trivy-image.sarif') != ''
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  # ─────────────────────────────────────────────
  # JOB 4: Deploy to Staging
  # ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build-push
    environment:
      name: staging
      url: https://staging.trophictech.io

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure CLI
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install kubelogin (required for AAD-enabled AKS)
        uses: azure/use-kubelogin@v1
        with:
          kubelogin-version: 'v0.1.4'

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER }}

      - name: Convert kubeconfig to use az CLI credentials
        run: kubelogin convert-kubeconfig -l azurecli

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.14.0'

      - name: Create Kubernetes app secrets from Key Vault (staging)
        run: |
          kubectl create namespace ${{ env.STAGING_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -
          DB_URL=$(az keyvault secret show --vault-name trophic-staging-kv --name DATABASE-URL --query value -o tsv)
          AUTH_SEC=$(az keyvault secret show --vault-name trophic-staging-kv --name AUTH-SECRET --query value -o tsv)
          NX_URL=$(az keyvault secret show --vault-name trophic-staging-kv --name NEXTAUTH-URL --query value -o tsv)
          kubectl create secret generic trophic-mc-secrets \
            --namespace ${{ env.STAGING_NAMESPACE }} \
            --from-literal=DATABASE_URL="$DB_URL" \
            --from-literal=AUTH_SECRET="$AUTH_SEC" \
            --from-literal=NEXTAUTH_URL="$NX_URL" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Run database migrations (staging)
        run: |
          IMAGE="${{ env.ACR_REGISTRY }}/${{ env.ACR_REPOSITORY }}:sha-${{ github.sha }}"
          JOB_NAME="db-migrate-${{ github.run_id }}"
          NS="${{ env.STAGING_NAMESPACE }}"
          kubectl apply -f - <<EOF
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ${JOB_NAME}
            namespace: ${NS}
          spec:
            ttlSecondsAfterFinished: 300
            backoffLimit: 0
            template:
              spec:
                restartPolicy: Never
                containers:
                - name: migrator
                  image: ${IMAGE}
                  workingDir: /app
                  command: ["node", "node_modules/prisma/build/index.js", "migrate", "deploy"]
                  envFrom:
                  - secretRef:
                      name: trophic-mc-secrets
          EOF
          echo "Waiting for migration job..."
          DEADLINE=$(($(date +%s) + 240))
          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            COMPLETE=$(kubectl get job/${JOB_NAME} -n ${NS} \
              -o jsonpath='{.status.conditions[?(@.type=="Complete")].status}' 2>/dev/null || true)
            FAILED=$(kubectl get job/${JOB_NAME} -n ${NS} \
              -o jsonpath='{.status.conditions[?(@.type=="Failed")].status}' 2>/dev/null || true)
            if [ "$COMPLETE" = "True" ]; then
              echo "Migration completed successfully."
              break
            fi
            if [ "$FAILED" = "True" ]; then
              echo "=== Migration job FAILED — pod logs ==="
              kubectl logs -n ${NS} -l job-name=${JOB_NAME} --tail=100 || true
              kubectl describe pods -n ${NS} -l job-name=${JOB_NAME} | tail -40 || true
              exit 1
            fi
            sleep 10
          done

      - name: Deploy to staging via Helm
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }}-staging ${{ env.HELM_CHART_PATH }} \
            --namespace ${{ env.STAGING_NAMESPACE }} \
            --create-namespace \
            --set image.repository=${{ env.ACR_REGISTRY }}/${{ env.ACR_REPOSITORY }} \
            --set image.tag=sha-${{ github.sha }} \
            --set image.digest=${{ needs.build-push.outputs.image-digest }} \
            --set replicaCount=2 \
            --set ingress.host=staging.trophictech.io \
            --set env=staging \
            --atomic \
            --timeout 10m \
            --wait

      - name: Debug staging pods on failure
        if: failure()
        run: |
          echo "=== Nodes ==="
          kubectl get nodes -o wide || true
          echo "=== Pods ==="
          kubectl get pods -n ${{ env.STAGING_NAMESPACE }} -o wide || true
          echo "=== Events (last 30) ==="
          kubectl get events -n ${{ env.STAGING_NAMESPACE }} --sort-by='.lastTimestamp' 2>/dev/null | tail -30 || true
          echo "=== Describe pods ==="
          kubectl describe pods -n ${{ env.STAGING_NAMESPACE }} 2>/dev/null | tail -80 || true

      - name: Run smoke tests against staging
        continue-on-error: true   # requires nginx-ingress + DNS — not set up in this environment
        run: |
          STAGING_URL="https://staging.trophictech.io"
          echo "Running smoke test against $STAGING_URL"
          curl --fail --retry 3 --retry-delay 10 --retry-all-errors \
            "$STAGING_URL/api/health" | jq -e '.status == "ok"'

  # ─────────────────────────────────────────────
  # JOB 5: Manual Approval Gate
  # ─────────────────────────────────────────────
  approval-gate:
    name: Production Approval Gate
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment:
      name: production-approval   # Requires a Reviewer in GitHub Environment settings

    steps:
      - name: Approval acknowledged
        run: echo "Production deployment approved by ${{ github.actor }}. Proceeding..."

  # ─────────────────────────────────────────────
  # JOB 6: Deploy to Production
  # ─────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production (AKS)
    runs-on: ubuntu-latest
    needs: [build-push, approval-gate]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://app.trophictech.io

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure CLI
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install kubelogin (required for AAD-enabled AKS)
        uses: azure/use-kubelogin@v1
        with:
          kubelogin-version: 'v0.1.4'

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER }}

      - name: Convert kubeconfig to use az CLI credentials
        run: kubelogin convert-kubeconfig -l azurecli

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.14.0'

      - name: Ensure production PostgreSQL is running
        run: |
          DB_SERVER="trophic-prod-pg"
          DB_RG="trophic-prod-rg"   # Terraform production resource group (trophic-prod-rg)
          STATE=$(az postgres flexible-server show \
            --name "$DB_SERVER" --resource-group "$DB_RG" \
            --query state -o tsv 2>/dev/null || echo "NotFound")
          echo "PostgreSQL state: $STATE"
          if [ "$STATE" = "NotFound" ]; then
            echo "ERROR: Production PostgreSQL '$DB_SERVER' not found in '$DB_RG'."
            echo "Run the terraform-production workflow to provision infrastructure first."
            exit 1
          fi
          if [ "$STATE" = "Stopped" ]; then
            echo "Starting production PostgreSQL server..."
            az postgres flexible-server start --name "$DB_SERVER" --resource-group "$DB_RG"
          fi
          for i in $(seq 1 30); do
            STATE=$(az postgres flexible-server show \
              --name "$DB_SERVER" --resource-group "$DB_RG" \
              --query state -o tsv 2>/dev/null || echo "Unknown")
            echo "  attempt $i/30 — state: $STATE"
            [ "$STATE" = "Ready" ] && break
            sleep 10
          done
          if [ "$STATE" != "Ready" ]; then
            echo "ERROR: PostgreSQL did not reach Ready state after 5 minutes."
            exit 1
          fi

      - name: Create Kubernetes app secrets from Key Vault (production)
        run: |
          kubectl create namespace ${{ env.PROD_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -
          DB_URL=$(az keyvault secret show --vault-name trophic-prod-kv --name DATABASE-URL --query value -o tsv)
          AUTH_SEC=$(az keyvault secret show --vault-name trophic-prod-kv --name AUTH-SECRET --query value -o tsv)
          NX_URL=$(az keyvault secret show --vault-name trophic-prod-kv --name NEXTAUTH-URL --query value -o tsv)
          kubectl create secret generic trophic-mc-secrets \
            --namespace ${{ env.PROD_NAMESPACE }} \
            --from-literal=DATABASE_URL="$DB_URL" \
            --from-literal=AUTH_SECRET="$AUTH_SEC" \
            --from-literal=NEXTAUTH_URL="$NX_URL" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Run database migrations (production)
        run: |
          IMAGE="${{ env.ACR_REGISTRY }}/${{ env.ACR_REPOSITORY }}:sha-${{ github.sha }}"
          JOB_NAME="db-migrate-${{ github.run_id }}"
          NS="${{ env.PROD_NAMESPACE }}"
          kubectl apply -f - <<EOF
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ${JOB_NAME}
            namespace: ${NS}
          spec:
            ttlSecondsAfterFinished: 300
            backoffLimit: 0
            template:
              spec:
                restartPolicy: Never
                containers:
                - name: migrator
                  image: ${IMAGE}
                  workingDir: /app
                  command: ["node", "node_modules/prisma/build/index.js", "migrate", "deploy"]
                  envFrom:
                  - secretRef:
                      name: trophic-mc-secrets
          EOF
          echo "Waiting for migration job..."
          DEADLINE=$(($(date +%s) + 240))
          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            COMPLETE=$(kubectl get job/${JOB_NAME} -n ${NS} \
              -o jsonpath='{.status.conditions[?(@.type=="Complete")].status}' 2>/dev/null || true)
            FAILED=$(kubectl get job/${JOB_NAME} -n ${NS} \
              -o jsonpath='{.status.conditions[?(@.type=="Failed")].status}' 2>/dev/null || true)
            if [ "$COMPLETE" = "True" ]; then
              echo "Migration completed successfully."
              break
            fi
            if [ "$FAILED" = "True" ]; then
              echo "=== Migration job FAILED — pod logs ==="
              kubectl logs -n ${NS} -l job-name=${JOB_NAME} --tail=100 || true
              kubectl describe pods -n ${NS} -l job-name=${JOB_NAME} | tail -40 || true
              exit 1
            fi
            sleep 10
          done

      - name: Deploy to production via Helm (canary → full)
        run: |
          # Step 1: Canary rollout (20% traffic)
          helm upgrade --install ${{ env.HELM_RELEASE }}-canary ${{ env.HELM_CHART_PATH }} \
            --namespace ${{ env.PROD_NAMESPACE }} \
            --create-namespace \
            --set image.repository=${{ env.ACR_REGISTRY }}/${{ env.ACR_REPOSITORY }} \
            --set image.tag=sha-${{ github.sha }} \
            --set replicaCount=1 \
            --set ingress.host=app.trophictech.io \
            --set ingress.canary.enabled=true \
            --set ingress.canary.weight=20 \
            --set env=production \
            --atomic \
            --timeout 10m

          echo "Canary running. Observing for 30s..."
          sleep 30

          # Step 2: helm --wait already validated canary readiness above

          # Step 3: Full production rollout
          helm upgrade --install ${{ env.HELM_RELEASE }} ${{ env.HELM_CHART_PATH }} \
            --namespace ${{ env.PROD_NAMESPACE }} \
            --set image.repository=${{ env.ACR_REGISTRY }}/${{ env.ACR_REPOSITORY }} \
            --set image.tag=sha-${{ github.sha }} \
            --set replicaCount=3 \
            --set ingress.host=app.trophictech.io \
            --set ingress.canary.enabled=false \
            --set env=production \
            --set resources.requests.cpu=250m \
            --set resources.requests.memory=256Mi \
            --set resources.limits.cpu=500m \
            --set resources.limits.memory=512Mi \
            --atomic \
            --timeout 10m

          # Step 4: Remove canary release
          helm uninstall ${{ env.HELM_RELEASE }}-canary \
            --namespace ${{ env.PROD_NAMESPACE }} \
            --ignore-not-found

      - name: Debug production pods on failure
        if: failure()
        run: |
          echo "=== Nodes ===" && kubectl get nodes -o wide || true
          echo "=== Pods ===" && kubectl get pods -n ${{ env.PROD_NAMESPACE }} -o wide || true
          echo "=== Events ===" && kubectl get events -n ${{ env.PROD_NAMESPACE }} --sort-by='.lastTimestamp' 2>/dev/null | tail -30 || true

      - name: Production health check & rollback guard
        continue-on-error: true   # requires nginx-ingress + DNS — not set up in this environment
        run: |
          PROD_URL="https://app.trophictech.io"
          HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}" "$PROD_URL/api/health")
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Health check FAILED (HTTP $HTTP_STATUS) — DNS/ingress not configured yet."
            exit 1
          fi
          echo "Production deployment healthy. HTTP $HTTP_STATUS OK."

      - name: Notify deployment success
        if: success()
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":rocket: *Trophic Tech* — Production deployment succeeded!\n*Image:* `sha-${{ github.sha }}`\n*Actor:* ${{ github.actor }}\n*URL:* https://app.trophictech.io"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify deployment failure
        if: failure()
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":x: *Trophic Tech* — Production deployment FAILED and rolled back!\n*Image:* `sha-${{ github.sha }}`\n*Actor:* ${{ github.actor }}\n*Run:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
