name: Trophic Tech — CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # required for upload-sarif to post to the Security tab
  pull-requests: read

env:
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}           # e.g. trophictech.azurecr.io
  ACR_REPOSITORY: ${{ secrets.ACR_REPOSITORY }}       # e.g. app-name
  AKS_CLUSTER: ${{ secrets.AKS_CLUSTER }}             # AKS cluster name
  AKS_RESOURCE_GROUP: ${{ secrets.AKS_RESOURCE_GROUP }}
  HELM_RELEASE: ${{ secrets.HELM_RELEASE }}           # e.g. trophic-app
  HELM_CHART_PATH: ./helm/app
  STAGING_NAMESPACE: staging
  PROD_NAMESPACE: production

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Security & Quality Gate
  # ─────────────────────────────────────────────
  security-scan:
    name: Security & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run ESLint
        id: eslint
        run: npm run lint -- --format=sarif --output-file=eslint-results.sarif
        continue-on-error: true

      - name: Upload ESLint results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && steps.eslint.outcome != 'skipped' && hashFiles('eslint-results.sarif') != ''
        with:
          sarif_file: eslint-results.sarif
          category: eslint

      - name: Run Trivy secret scan (source)
        id: trivy-source
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'secret,vuln'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          format: 'sarif'
          output: 'trivy-source.sarif'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && steps.trivy-source.outcome != 'skipped' && hashFiles('trivy-source.sarif') != ''
        with:
          sarif_file: trivy-source.sarif
          category: trivy-source

  # ─────────────────────────────────────────────
  # JOB 2: Unit & Integration Tests
  # ─────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: security-scan
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run unit tests with coverage
        run: npm run test:coverage
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
          NODE_ENV: test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  # ─────────────────────────────────────────────
  # JOB 3: Docker Build & Push to ACR
  # ─────────────────────────────────────────────
  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ACR_REGISTRY }}/${{ env.ACR_REPOSITORY }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push image to ACR
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.ACR_REGISTRY }}/${{ env.ACR_REPOSITORY }}:buildcache
          cache-to: type=registry,ref=${{ env.ACR_REGISTRY }}/${{ env.ACR_REPOSITORY }}:buildcache,mode=max
          provenance: true
          sbom: true

      - name: Scan Docker image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ACR_REGISTRY }}/${{ env.ACR_REPOSITORY }}:sha-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-image.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

      - name: Upload image scan SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-image.sarif') != ''
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  # ─────────────────────────────────────────────
  # JOB 4: Deploy to Staging
  # ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build-push
    environment:
      name: staging
      url: https://staging.trophictech.io

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure CLI
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER }}

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.14.0'

      - name: Deploy to staging via Helm
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }}-staging ${{ env.HELM_CHART_PATH }} \
            --namespace ${{ env.STAGING_NAMESPACE }} \
            --create-namespace \
            --set image.repository=${{ env.ACR_REGISTRY }}/${{ env.ACR_REPOSITORY }} \
            --set image.tag=sha-${{ github.sha }} \
            --set image.digest=${{ needs.build-push.outputs.image-digest }} \
            --set replicaCount=2 \
            --set ingress.host=staging.trophictech.io \
            --set env=staging \
            --atomic \
            --timeout 5m \
            --wait

      - name: Run smoke tests against staging
        run: |
          echo "Waiting for deployment rollout..."
          kubectl rollout status deployment/${{ env.HELM_RELEASE }}-staging \
            -n ${{ env.STAGING_NAMESPACE }} \
            --timeout=300s

          STAGING_URL="https://staging.trophictech.io"
          echo "Running smoke test against $STAGING_URL"
          curl --fail --retry 3 --retry-delay 10 "$STAGING_URL/healthz" \
            | jq -e '.status == "ok"'

  # ─────────────────────────────────────────────
  # JOB 5: Manual Approval Gate
  # ─────────────────────────────────────────────
  approval-gate:
    name: Production Approval Gate
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment:
      name: production-approval   # Requires a Reviewer in GitHub Environment settings

    steps:
      - name: Approval acknowledged
        run: echo "Production deployment approved by ${{ github.actor }}. Proceeding..."

  # ─────────────────────────────────────────────
  # JOB 6: Deploy to Production
  # ─────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production (AKS)
    runs-on: ubuntu-latest
    needs: [build-push, approval-gate]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://app.trophictech.io

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure CLI
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER }}

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.14.0'

      - name: Deploy to production via Helm (canary → full)
        run: |
          # Step 1: Canary rollout (20% traffic)
          helm upgrade --install ${{ env.HELM_RELEASE }}-canary ${{ env.HELM_CHART_PATH }} \
            --namespace ${{ env.PROD_NAMESPACE }} \
            --create-namespace \
            --set image.repository=${{ env.ACR_REGISTRY }}/${{ env.ACR_REPOSITORY }} \
            --set image.tag=sha-${{ github.sha }} \
            --set replicaCount=1 \
            --set ingress.host=app.trophictech.io \
            --set ingress.canary.enabled=true \
            --set ingress.canary.weight=20 \
            --set env=production \
            --atomic \
            --timeout 5m

          echo "Canary running. Observing for 90s..."
          sleep 90

          # Step 2: Validate canary health before full rollout
          kubectl rollout status deployment/${{ env.HELM_RELEASE }}-canary \
            -n ${{ env.PROD_NAMESPACE }} \
            --timeout=120s

          # Step 3: Full production rollout
          helm upgrade --install ${{ env.HELM_RELEASE }} ${{ env.HELM_CHART_PATH }} \
            --namespace ${{ env.PROD_NAMESPACE }} \
            --set image.repository=${{ env.ACR_REGISTRY }}/${{ env.ACR_REPOSITORY }} \
            --set image.tag=sha-${{ github.sha }} \
            --set replicaCount=3 \
            --set ingress.host=app.trophictech.io \
            --set ingress.canary.enabled=false \
            --set env=production \
            --set resources.requests.cpu=250m \
            --set resources.requests.memory=256Mi \
            --set resources.limits.cpu=500m \
            --set resources.limits.memory=512Mi \
            --atomic \
            --timeout 10m

          # Step 4: Remove canary release
          helm uninstall ${{ env.HELM_RELEASE }}-canary \
            --namespace ${{ env.PROD_NAMESPACE }} \
            --ignore-not-found

      - name: Production health check & rollback guard
        run: |
          echo "Verifying production rollout..."
          kubectl rollout status deployment/${{ env.HELM_RELEASE }} \
            -n ${{ env.PROD_NAMESPACE }} \
            --timeout=300s

          PROD_URL="https://app.trophictech.io"
          HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}" "$PROD_URL/healthz")

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Health check FAILED (HTTP $HTTP_STATUS). Initiating rollback..."
            helm rollback ${{ env.HELM_RELEASE }} 0 \
              --namespace ${{ env.PROD_NAMESPACE }} \
              --wait
            exit 1
          fi

          echo "Production deployment healthy. HTTP $HTTP_STATUS OK."

      - name: Notify deployment success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":rocket: *Trophic Tech* — Production deployment succeeded!\n*Image:* `sha-${{ github.sha }}`\n*Actor:* ${{ github.actor }}\n*URL:* https://app.trophictech.io"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify deployment failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":x: *Trophic Tech* — Production deployment FAILED and rolled back!\n*Image:* `sha-${{ github.sha }}`\n*Actor:* ${{ github.actor }}\n*Run:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
