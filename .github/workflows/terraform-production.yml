name: Terraform — Production Infrastructure (AKS)

# Triggered by:
#   - PR to main     → plan job: shows exactly what will change in Azure
#   - Push to main   → apply job: provisions/updates all production resources
#                      gated by the "production" GitHub Environment reviewer
#   - workflow_dispatch → manual plan or apply from the Actions tab
#
# Required GitHub secrets (shared with staging workflow):
#   AZURE_CLIENT_ID       — Service Principal client ID (OIDC)
#   AZURE_TENANT_ID       — Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID — Azure subscription
#   TF_DB_ADMIN_PASSWORD  — PostgreSQL admin password
#   TF_AUTH_SECRET        — Auth.js AUTH_SECRET

on:
  pull_request:
    branches: [main]
    paths:
      - "infrastructure/terraform/environments/production/**"
      - "infrastructure/terraform/modules/**"
  push:
    branches: [main]
    paths:
      - "infrastructure/terraform/environments/production/**"
      - "infrastructure/terraform/modules/**"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        default: plan
        type: choice
        options: [plan, apply]

permissions:
  id-token: write       # OIDC token exchange with Azure AD
  contents: read
  pull-requests: write  # post plan output as PR comment

env:
  TF_DIR: infrastructure/terraform/environments/production
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: "true"
  TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  TF_VAR_db_admin_password: ${{ secrets.TF_DB_ADMIN_PASSWORD }}
  TF_VAR_auth_secret: ${{ secrets.TF_AUTH_SECRET }}
  TF_IN_AUTOMATION: "true"

jobs:
  # ── Plan ─────────────────────────────────────────────────────────────────────
  # Runs on every PR to main. Posts the full Terraform diff as a collapsible
  # PR comment so reviewers can see every Azure resource that will change
  # before they approve the PR.
  plan:
    name: Terraform Plan (Production)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && inputs.action == 'plan')

    defaults:
      run:
        working-directory: ${{ env.TF_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure OIDC login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
          FMT_OUTCOME: ${{ steps.fmt.outcome }}
          VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            let plan = fs.readFileSync(
              path.join(process.env.TF_DIR, 'plan_output.txt'),
              'utf8'
            );
            if (plan.length > 60000) {
              plan = '... (truncated — first 60k chars)\n\n' + plan.slice(0, 60000);
            }

            const planOk = process.env.PLAN_OUTCOME    === 'success';
            const fmtOk  = process.env.FMT_OUTCOME     === 'success';
            const valOk  = process.env.VALIDATE_OUTCOME === 'success';

            const statusLine = [
              `Format: ${fmtOk  ? '✅' : '⚠️'}`,
              `Validate: ${valOk ? '✅' : '❌'}`,
              `Plan: ${planOk   ? '✅' : '❌'}`,
            ].join('  |  ');

            const body = `## 🏗️ Terraform Production Plan

            ${statusLine}
            ${!fmtOk ? '\n> ⚠️ Run `terraform fmt -recursive` to fix formatting.\n' : ''}

            <details>
            <summary>Show plan diff (AKS + all production resources)</summary>

            \`\`\`hcl
            ${plan}
            \`\`\`
            </details>

            ---
            Merging this PR triggers **\`terraform apply\`** on \`production\` after reviewer approval.`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

            if (!planOk) core.setFailed('Terraform plan failed — see plan output above.');

  # ── Apply ─────────────────────────────────────────────────────────────────────
  # Runs after any push to main (i.e. after a PR is merged).
  # The "production" GitHub Environment gate holds execution here until
  # a designated reviewer manually approves the deployment in GitHub UI.
  apply:
    name: Terraform Apply (Production)
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.action == 'apply')
    environment:
      name: production
      url: https://app.zingy.io

    defaults:
      run:
        working-directory: ${{ env.TF_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure OIDC login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan (pre-apply gate)
        run: terraform plan -no-color -detailed-exitcode -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Write job summary
        run: |
          echo "## ✅ Production Infrastructure Applied" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor  | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run    | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Terraform Outputs" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          terraform output -json 2>/dev/null || echo "{}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
