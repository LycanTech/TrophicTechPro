# ── Image ─────────────────────────────────────────────────────
image:
  repository: trophictech.azurecr.io/mission-control
  tag: latest
  pullPolicy: IfNotPresent
  digest: ""

imagePullSecrets: []   # AcrPull via kubelet managed identity — no pull secret needed

# ── Replica & environment ─────────────────────────────────────
replicaCount: 3
env: production

# ── Application environment variables ─────────────────────────
env_vars:
  NODE_ENV:               production
  NEXT_TELEMETRY_DISABLED: "1"
  PORT:                   "3000"
  HOSTNAME:               "0.0.0.0"

# ── Secrets (referenced from K8s Secret, not inlined) ─────────
existingSecret: trophic-mc-secrets
# Secret must contain: DATABASE_URL, AUTH_SECRET, NEXTAUTH_URL

# ── Service ───────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 80
  targetPort: 3000

# ── Ingress ───────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  host: app.trophictech.io
  tls:
    enabled: true
    secretName: trophic-tls
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  canary:
    enabled: false
    weight: 0

# ── Resources ────────────────────────────────────────────────
resources:
  requests:
    cpu:    250m
    memory: 256Mi
  limits:
    cpu:    500m
    memory: 512Mi

# ── HPA ──────────────────────────────────────────────────────
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# ── Probes ───────────────────────────────────────────────────
livenessProbe:
  httpGet:
    path: /api/health
    port: 3000
  initialDelaySeconds: 20
  periodSeconds:       15
  failureThreshold:    3

readinessProbe:
  httpGet:
    path: /api/health
    port: 3000
  initialDelaySeconds: 10
  periodSeconds:       10
  failureThreshold:    3

# ── Pod disruption budget ─────────────────────────────────────
podDisruptionBudget:
  enabled: true
  minAvailable: 2

# ── Security context ─────────────────────────────────────────
podSecurityContext:
  fsGroup: 1001
  runAsNonRoot: true

containerSecurityContext:
  runAsUser:               1001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem:   false
  capabilities:
    drop: ["ALL"]

# ── Node affinity / tolerations ──────────────────────────────
nodeSelector: {}
tolerations: []
affinity: {}
