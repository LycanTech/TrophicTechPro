# ── Image ─────────────────────────────────────────────────────
image:
  repository: trophictech.azurecr.io/mission-control
  tag: latest
  pullPolicy: IfNotPresent
  digest: ""

imagePullSecrets: []   # AcrPull via kubelet managed identity — no pull secret needed

# ── Replica & environment ─────────────────────────────────────
replicaCount: 1
env: production

# ── Application environment variables ─────────────────────────
env_vars:
  NODE_ENV:               production
  NEXT_TELEMETRY_DISABLED: "1"
  PORT:                   "3000"
  HOSTNAME:               "0.0.0.0"

# ── Secrets (referenced from K8s Secret, not inlined) ─────────
existingSecret: trophic-mc-secrets
# Secret must contain: DATABASE_URL, AUTH_SECRET, NEXTAUTH_URL

# ── Service ───────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 80
  targetPort: 3000

# ── Ingress ───────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  host: app.68.220.239.81.nip.io
  tls:
    enabled: false
    secretName: trophic-tls
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  canary:
    enabled: false
    weight: 0

# ── Resources ────────────────────────────────────────────────
resources:
  requests:
    cpu:    100m
    memory: 128Mi
  limits:
    cpu:    250m
    memory: 256Mi

# ── HPA ──────────────────────────────────────────────────────
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# ── Probes ───────────────────────────────────────────────────
livenessProbe:
  httpGet:
    path: /api/health
    port: 3000
  initialDelaySeconds: 60
  periodSeconds:       20
  failureThreshold:    6

readinessProbe:
  httpGet:
    path: /api/health
    port: 3000
  initialDelaySeconds: 30
  periodSeconds:       15
  failureThreshold:    6

# ── Pod disruption budget ─────────────────────────────────────
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# ── Security context ─────────────────────────────────────────
podSecurityContext:
  fsGroup: 1001
  runAsNonRoot: true

containerSecurityContext:
  runAsUser:               1001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem:   false
  capabilities:
    drop: ["ALL"]

# ── Node affinity / tolerations ──────────────────────────────
nodeSelector: {}
tolerations: []
affinity: {}
